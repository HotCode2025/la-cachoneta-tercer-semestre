<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, papel y tijera</title>
    <script>
        //hacer funcion con la formula, llamar formula y que pase parametros, 
        // en los argumentos paso los numeros que necesito

        // 1 será piedra, 2 será papel y 3 será tijera

        
        function azar(min,max){
            return Math.floor(Math.random()*(max-min + 1)+min);
        }
        
        function eleccion(jugador){
         if(jugador ==1)  return "Piedra 🪨";
         if (jugador ==2) return "Papel 📃";
         if(jugador ==3) return "Tijera ✂️";
         return "Elige una opcion valida 🚩";  
        }
       


        //Combate
    function combatir(jugador,pc){
     if(pc == jugador){
        return("EMPATE")
    } else if(jugador == 1 && pc == 3){
        return("LA PIEDRA 🪨 HA ROTO LAS TIJERAS ✂️, GANASTE✅! ")
    }else if (jugador == 2 && pc == 1){
        return("TU PAPEL 📃 HA ENVUELTO A LA PIEDRA 🪨, GANASTE✅! ")
    } else if(jugador == 3 && pc == 2){
        return("TUS TIJERAS ✂️ CORTARON EL PAPEL 📃, GANASTE✅!")
    } else{
        return("HAS PERDIDO❌")
        }    
    }
   
    //let max = 3
    //let min = 1
    //let pc = Math.floor(Math.random()*(max-min+1)+min)

    let pc = azar(1,3);
    let jugador = prompt("Elige : 1 piedra, 2 papel, 3 tijera")

    //Se van a mostrar los nombres de los jugadores
    alert("PC elige: "+eleccion(pc));
    alert("Vos elegiste: "+eleccion(jugador));
    //Se llama a la funcion combatir y se le pasan los argumentos
    let resultadoFinal = combatir(jugador,pc);
    
    alert(resultadoFinal);

    </script>
</head>
<body>
    <h1>Piedra, Papel y Tijera</h1>
</body>
</html>
