<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tour del Caballo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Tour del Caballo - Backtracking</h1>

    <div class="controles">

        <label>
            Tamaño del tablero:
        </label>

        <input
            type="number"
            id="tamano"
            min="5"
            max="8"
            value="8"
        >

        <button id="btnResolver">
            Resolver
        </button>

    </div>

    <div id="info">
        Movimiento: 0
    </div>

    <div id="tablero"></div>

    <script src="main.js"></script>

</body>
</html>
