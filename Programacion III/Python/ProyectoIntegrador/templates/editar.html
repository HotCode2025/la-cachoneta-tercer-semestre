{% extends 'base.html' %} 
{% block title %}Editar producto{% endblock %} 
{%block content %}
        <a href="/" class="nav-link">&larr; Volver al Inicio</a>

        <div class="card">
    <h1>Editar Producto</h1>

    {% if error %}
    <div class="alert {{ tipo }}">
        {{ error }}
    </div>
    {% endif %}
    <form method="POST">
        <label>Nombre</label>
        <input type="text" value="{{ producto.nombre }}" disabled>

        <label>Precio</label>
        <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required>

        <label>Stock</label>
        <input type="number" name="stock" value="{{ producto.stock }}" required>

        <button class="confirm-button" type="submit">Guardar Cambios</button>
    </form>
</div>
{% endblock %}
