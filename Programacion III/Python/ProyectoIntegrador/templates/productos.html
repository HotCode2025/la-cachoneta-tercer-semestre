{% extends 'base.html' %} 
{% block title %}Lista de productos{% endblock %} 
{%block content %}
<a href="/" class="nav-link">&larr; Volver al Inicio</a>

<h1>Productos</h1>
<div class="card">
  <table>
    <tr>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Stock</th>
    </tr>

    {% for p in productos %}

    <tr>
      <td>{{ p.nombre }}</td>
      <td>${{ p.precio }}</td>
      <td>{{ p.stock }}</td>
    </tr>

    {% endfor %}
  </table>
</div>
{% endblock %}
