<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">

        <div class="card">
            <h2>Total de Ventas</h2>
            <p style="font-size: 2rem; font-weight: bold; color: var(--primary-color); margin: 0; margin-bottom: 1rem;">
                ${{ total_ventas }}
            </p>
            <a href="/ventas" style="display: inline-block; background-color: var(--primary-color); color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 0.375rem; font-weight: 500;">
                Ver Historial de Ventas &rarr;
            </a>
        </div>

        <div class="card">
            <h2>Agregar Producto</h2>
            <form action="/agregar" method="POST">
                <input type="text" name="nombre" placeholder="Nombre del producto" required>
                <input type="number" step="0.01" name="precio" placeholder="Precio ($)" required>
                <input type="number" name="stock" placeholder="Cantidad en Stock" required>
                <button type="submit">Agregar Producto</button>
            </form>
        </div>

        <div class="card">
            <h2>Inventario de Productos</h2>
            <table>
                <tr>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>

                {% for p in productos %}
                <tr>
                    <td>{{ p.nombre }}</td>
                    <td>${{ p.precio }}</td>
                    <td>
                        {% if p.stock <= 10 %}
                            <span class="critico">{{ p.stock }}</span>
                        {% else %}
                            {{ p.stock }}
                        {% endif %}
                    </td>
                    <td style="display: flex; align-items: center;">
                        <form action="/vender" method="POST" class="inline-form">
                            <input type="hidden" name="nombre" value="{{ p.nombre }}">
                            <input type="number" name="cantidad" min="1" placeholder="Cant." required>
                            <button type="submit">Vender</button>
                        </form>
                        <a href="/editar/{{ p.nombre }}">Editar</a>
                        <a href="/eliminar/{{ p.nombre }}" style="color: var(--danger-color);">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>

    </div>

</body>
</html>
